name: Build Firefox IPA for TrollStore

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        type: choice
        options:
          - Fennec_Enterprise
        default: Fennec_Enterprise
  push:
    branches:
      - main
      - feat/trollstore-ipa-build
    paths:
      - 'firefox-ios/**'
      - 'BrowserKit/**'
      - '.github/workflows/trollstore-build.yml'

jobs:
  build:
    name: Build IPA
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('firefox-ios/Client.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package.json', 'package-lock.json') }}

      - name: Xcode & Swift info
        run: |
          echo "Available Xcodes:"
          ls /Applications/Xcode_*.app 2>/dev/null || echo "(none)"
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Bootstrap
        run: |
          ./bootstrap.sh focus 2>&1 || true
          ./bootstrap.sh firefox
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve SPM packages
        working-directory: firefox-ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Client.xcodeproj \
            -derivedDataPath ../DerivedData \
            -onlyUsePackageVersionsFromResolvedFile 2>&1 || true
          xcodebuild -resolvePackageDependencies \
            -project Client.xcodeproj \
            -derivedDataPath ../DerivedData

      - name: Build
        id: build
        working-directory: firefox-ios
        timeout-minutes: 90
        run: |
          BUILD_DIR="../DerivedData"
          rm -rf "${BUILD_DIR}/Build"

          echo "=== Self-signed cert ==="

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 7200 build.keychain

          openssl genpkey -algorithm RSA -out /tmp/ca_key.pem -pkeyopt rsa_keygen_bits:2048
          openssl req -new -x509 -days 7300 -key /tmp/ca_key.pem -out /tmp/ca_cert.pem \
            -subj "/CN=TrollStore CA"
          openssl genpkey -algorithm RSA -out /tmp/dev_key.pem -pkeyopt rsa_keygen_bits:2048
          openssl req -new -key /tmp/dev_key.pem -out /tmp/dev.csr \
            -subj "/emailAddress=dev@trollstore.local/CN=TrollStore/O=Home/C=US"

          cat > /tmp/dev.ext << 'CONF'
          basicConstraints=CA:FALSE
          keyUsage=digitalSignature
          extendedKeyUsage=codeSigning
          subjectKeyIdentifier=hash
          CONF

          openssl x509 -req -days 7300 -in /tmp/dev.csr -CA /tmp/ca_cert.pem \
            -CAkey /tmp/ca_key.pem -CAcreateserial -out /tmp/dev_cert.pem \
            -extfile /tmp/dev.ext

          openssl pkcs12 -export -legacy \
            -in /tmp/dev_cert.pem -inkey /tmp/dev_key.pem \
            -out /tmp/dev.p12 -passout pass:trollstore \
            -certfile /tmp/ca_cert.pem 2>&1

          security import /tmp/dev.p12 -k build.keychain -P trollstore -A \
            -T /usr/bin/codesign -T /usr/bin/security 2>&1 || {
              echo "PKCS12 import failed, trying without password..."
              openssl pkcs12 -export -legacy \
                -in /tmp/dev_cert.pem -inkey /tmp/dev_key.pem \
                -out /tmp/dev_nopass.p12 -passout pass: \
                -certfile /tmp/ca_cert.pem 2>&1
              security import /tmp/dev_nopass.p12 -k build.keychain -P "" -A \
                -T /usr/bin/codesign -T /usr/bin/security 2>&1
            }

          security import /tmp/ca_cert.pem -k build.keychain -A \
            -T /usr/bin/codesign -T /usr/bin/security 2>&1
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          CERT_NAME=$(security find-identity -p codesigning -v build.keychain 2>/dev/null | grep -o '"[^"]*"' | head -1 | tr -d '"')
          if [ -z "$CERT_NAME" ]; then
            echo "Cert not found in keychain, listing identities:"
            security find-identity -p codesigning -v build.keychain 2>&1 || true
            CERT_NAME="TrollStore"
          fi
          echo "Cert: ${CERT_NAME}"

          PROFILE_UUID=$(uuidgen)
          DEV_CERT_DER=$(openssl x509 -in /tmp/dev_cert.pem -outform DER 2>/dev/null | base64)

          python3 - "${PROFILE_UUID}" "${DEV_CERT_DER}" << 'PYEOF'
          import plistlib, os, sys, base64
          from datetime import datetime, timedelta, timezone
          profile_uuid, dev_cert_der = sys.argv[1], sys.argv[2]
          entitlements = {}
          ent_path = "Client/Entitlements/FennecEnterpriseApplication.entitlements"
          if os.path.exists(ent_path):
              with open(ent_path, "rb") as f:
                  entitlements = plistlib.load(f)
          cert_data = base64.b64decode(dev_cert_der)
          profile = {
              "AppIDName": "Firefox", "ApplicationIdentifierPrefix": ["0000000000"],
              "CreationDate": datetime.now(timezone.utc), "Platform": ["iOS"],
              "IsXcodeManaged": False,
              "DeveloperCertificates": [cert_data],
              "Entitlements": entitlements,
              "ExpirationDate": datetime.now(timezone.utc) + timedelta(days=7300),
              "Name": "Firefox TrollStore", "ProvisionedDevices": [],
              "TeamIdentifier": ["0000000000"], "TeamName": "TrollStore",
              "TimeToLive": 7300, "UUID": profile_uuid, "Version": 1,
          }
          with open("/tmp/profile.plist", "wb") as f:
              plistlib.dump(profile, f, fmt=plistlib.FMT_XML)
          PYEOF

          if [ -n "$CERT_NAME" ]; then
            security cms -S -N "${CERT_NAME}" \
              -i /tmp/profile.plist -o "/tmp/${PROFILE_UUID}.mobileprovision" \
              -k build.keychain 2>/dev/null || true
          fi
          if [ ! -f "/tmp/${PROFILE_UUID}.mobileprovision" ]; then
            cp /tmp/profile.plist "/tmp/${PROFILE_UUID}.mobileprovision"
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "/tmp/${PROFILE_UUID}.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/

          xcodebuild build \
            -skipMacroValidation \
            -project Client.xcodeproj \
            -scheme Fennec_Enterprise \
            -sdk iphoneos \
            -configuration Fennec_Enterprise \
            -derivedDataPath "${BUILD_DIR}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${CERT_NAME}" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM=0000000000 \
            OTHER_CODE_SIGN_FLAGS="--generate-entitlement-der" \
            DEBUG_INFORMATION_FORMAT=dwarf \
            2>&1 | tee ../build.log | tail -200

          APP_PATH=$(find "${BUILD_DIR}" -name "Client.app" -path "*/Products/*" ! -path "*/Index*" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ] || [ ! -f "$APP_PATH/Info.plist" ]; then
            echo ""
            echo "Build failed. Errors:"
            grep -i "error:" ../build.log 2>/dev/null | head -50
            exit 1
          fi
          echo "BUILD_METHOD=self-signed" >> $GITHUB_OUTPUT
          echo "APP_PATH=${APP_PATH}" >> $GITHUB_OUTPUT
          echo "Build succeeded!"

      - name: Package IPA
        working-directory: firefox-ios
        run: |
          APP_PATH="${{ steps.build.outputs.APP_PATH }}"
          echo "App: ${APP_PATH}"

          brew install ldid 2>/dev/null || true
          if command -v ldid &>/dev/null; then
            ENT="firefox-ios/Client/Entitlements/FennecEnterpriseApplication.entitlements"
            ldid -S "${ENT}" "${APP_PATH}/Client" 2>/dev/null || true
            find "${APP_PATH}" -type f \( -name "*.dylib" -o -name "*.framework" \) 2>/dev/null | while read f; do
              ldid -S "${ENT}" "$f" 2>/dev/null || true
            done
          fi

          rm -rf Payload
          mkdir -p Payload
          cp -r "${APP_PATH}" Payload/
          zip -rq Firefox-TrollStore.ipa Payload/
          rm -rf Payload
          echo "IPA created"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Firefox-TrollStore
          path: firefox-ios/Firefox-TrollStore.ipa
          retention-days: 7

      - name: Summary
        run: |
          IPA_SIZE=$(ls -lh firefox-ios/Firefox-TrollStore.ipa | awk '{print $5}')
          {
            echo "### Firefox for TrollStore ✓"
            echo ""
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 适用 | iOS 17.0 + 巨魔(TrollStore) |"
            echo "| Bundle ID | org.mozilla.ios.FennecEnterprise |"
            echo "| IPA 大小 | ${IPA_SIZE} |"
            echo "| 构建方式 | ${{ steps.build.outputs.BUILD_METHOD }} |"
            echo ""
            echo "**安装**: 下载下方 IPA → 用巨魔打开 → 点 Install"
          } >> $GITHUB_STEP_SUMMARY
